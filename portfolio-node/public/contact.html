<!DOCTYPE html>
<html>
  <head>
    <title>Contact - Personal Portfolio</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header>
      <h1>About Me</h1>
      <nav aria-label="Main navigation">
        <a href="index.html#about" title="About Me">About</a>
        <a href="index.html#projects" title="My Projects">Projects</a>
        <a href="index.html#hobbies" title="My Hobbies">Hobbies</a>
        <a href="contact.html" title="Contact Page">Contact Page</a>
      </nav>
    </header>

    <main>
      <section id="upload">
        <h2>Upload Document</h2>
        <input type="file" id="document-upload" accept=".pdf,.txt">
        <button id="upload-btn">Upload</button>

        <h3>Uploaded Documents</h3>
        <ul id="documents-list"></ul>
      </section>

      <section id="contact">
        <h2>Prompt Submission</h2>
        <p>Submit your prompt below:</p>
        <form id="contact-form">
          <label for="messages">Message:</label>
          <textarea id="messages" name="messages" rows="4"></textarea>

          <label for="retrieval-method">Retrieval Method:</label>
          <select id="retrieval-method" name="retrievalMethod">
            <option value="semantic">Semantic (Embeddings)</option>
            <option value="tfidf">TF-IDF (Keyword)</option>
          </select>

          <input type="submit" id="submit-btn" value="Submit">
        </form>
        <div id="response"></div>
        <div id="retrieved-docs"></div>
        <div id="confidence-metrics"></div>
      </section>
    </main>

    <footer>
      <p> Abel Alemayehu </p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
